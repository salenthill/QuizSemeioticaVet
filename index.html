<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Semeiotica Veterinaria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #080f0c;
            --bg-card: #111d18;
            --bg-card-alt: #162520;
            --primary: #34d399;
            --primary-dim: rgba(52,211,153,0.12);
            --accent: #e5a930;
            --accent-dim: rgba(229,169,48,0.12);
            --text: #e4ece7;
            --text-muted: #6e8a7d;
            --correct: #22c55e;
            --correct-bg: rgba(34,197,94,0.07);
            --correct-border: rgba(34,197,94,0.35);
            --wrong: #f43f5e;
            --wrong-bg: rgba(244,63,94,0.07);
            --wrong-border: rgba(244,63,94,0.35);
            --border: #1a2e25;
            --border-light: #244035;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 30%, rgba(52,211,153,0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 70%, rgba(229,169,48,0.035) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 100%, rgba(52,211,153,0.03) 0%, transparent 40%);
            animation: bgPulse 18s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes bgPulse {
            0% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0.6; transform: scale(1.08) translateY(-20px); }
        }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* Schermate */
        .screen { position: relative; z-index: 1; display: none; }
        .screen.active { display: flex; }

        /* Setup */
        #setup-screen {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .setup-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .setup-card .logo-icon {
            width: 56px; height: 56px;
            background: var(--primary-dim);
            border: 1px solid var(--correct-border);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.25rem;
            color: var(--primary);
            font-size: 1.5rem;
        }

        /* Lista / Select */
        .list-box {
            width: 100%;
            height: 260px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.925rem;
            padding: 0.5rem;
            outline: none;
            overflow-y: auto;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .list-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-dim); }
        .list-box option {
            padding: 0.55rem 0.75rem;
            border-radius: 6px;
            margin-bottom: 2px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .list-box option:hover { background: var(--bg-card-alt); }
        .list-box option:checked { background: var(--primary-dim); color: var(--primary); }
        .list-box optgroup {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            padding: 0.5rem 0.75rem 0.15rem;
        }

        /* Numero domande */
        .num-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 1rem;
            padding: 0.7rem 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .num-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-dim); }

        /* Bottone primario */
        .btn-primary {
            width: 100%;
            padding: 0.85rem 1.5rem;
            background: var(--primary);
            color: #080f0c;
            font-family: 'Source Sans 3', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }
        .btn-primary:hover { background: #4ade80; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(52,211,153,0.25); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-secondary {
            padding: 0.7rem 1.5rem;
            background: transparent;
            color: var(--primary);
            font-family: 'Source Sans 3', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover { background: var(--primary-dim); border-color: var(--primary); }

        /* Quiz */
        #quiz-screen {
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem 1rem 3rem;
        }
        .quiz-container { width: 100%; max-width: 700px; }
        .progress-track {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #4ade80);
            border-radius: 3px;
            transition: width 0.4s ease;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 40px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25));
            animation: shimmer 1.5s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .question-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 2rem 1.75rem;
            margin-top: 1rem;
        }
        .question-area-badge {
            display: inline-block;
            padding: 0.25rem 0.7rem;
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 600;
            border-radius: 6px;
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.6;
            color: var(--text);
        }

        /* Opzioni risposta */
        .options-list { margin-top: 1.25rem; display: flex; flex-direction: column; gap: 0.65rem; }
        .option-btn {
            display: flex;
            align-items: flex-start;
            gap: 0.85rem;
            width: 100%;
            text-align: left;
            padding: 1rem 1.15rem;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            cursor: pointer;
            transition: all 0.18s;
        }
        .option-btn:hover:not(.locked) {
            border-color: var(--border-light);
            background: var(--bg-card-alt);
        }
        .option-btn.selected:not(.locked) {
            border-color: var(--primary);
            background: var(--primary-dim);
        }
        .option-btn .opt-letter {
            flex-shrink: 0;
            width: 30px; height: 30px;
            border-radius: 8px;
            background: var(--border);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: all 0.18s;
        }
        .option-btn.selected:not(.locked) .opt-letter {
            background: var(--primary);
            color: #080f0c;
        }
        .option-btn.locked { cursor: default; }
        .option-btn.correct-answer {
            border-color: var(--correct-border) !important;
            background: var(--correct-bg) !important;
        }
        .option-btn.correct-answer .opt-letter {
            background: var(--correct) !important;
            color: #fff !important;
        }
        .option-btn.wrong-selected {
            border-color: var(--wrong-border) !important;
            background: var(--wrong-bg) !important;
        }
        .option-btn.wrong-selected .opt-letter {
            background: var(--wrong) !important;
            color: #fff !important;
        }
        .option-btn.dimmed { opacity: 0.45; }

        /* Feedback */
        .feedback-box {
            margin-top: 1.25rem;
            border-radius: 12px;
            padding: 1.25rem 1.35rem;
            animation: slideDown 0.35s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .feedback-box.correct {
            background: var(--correct-bg);
            border: 1px solid var(--correct-border);
        }
        .feedback-box.wrong {
            background: var(--wrong-bg);
            border: 1px solid var(--wrong-border);
        }
        .feedback-title {
            display: flex; align-items: center; gap: 0.6rem;
            font-weight: 700; font-size: 1.05rem;
            margin-bottom: 0.65rem;
        }
        .feedback-box.correct .feedback-title { color: var(--correct); }
        .feedback-box.wrong .feedback-title { color: var(--wrong); }
        .spiegazione-box {
            margin-top: 0.85rem;
            padding: 1rem 1.15rem;
            background: rgba(255,255,255,0.03);
            border-left: 3px solid var(--accent);
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;
            line-height: 1.65;
            color: #c5d4cb;
        }
        .spiegazione-label {
            font-weight: 700;
            color: var(--accent);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.35rem;
        }

        /* Risultati */
        #results-screen {
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem 3rem;
        }
        .results-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
        }
        .score-ring { margin: 0 auto 1.25rem; }
        .score-ring circle { transition: stroke-dashoffset 1.2s ease; }
        .review-item {
            text-align: left;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.15rem 1.25rem;
            margin-bottom: 0.75rem;
        }
        .review-item.was-correct { border-left: 3px solid var(--correct); }
        .review-item.was-wrong { border-left: 3px solid var(--wrong); }

        /* Scrollbar personalizzata */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Responsivo */
        @media (max-width: 640px) {
            .setup-card { padding: 1.75rem 1.25rem; }
            .question-card { padding: 1.5rem 1.25rem; }
            .question-text { font-size: 1.08rem; }
            .list-box { height: 220px; font-size: 0.85rem; }
        }

        /* Riduzione movimento */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>

    <!-- ============ SETUP ============ -->
    <div id="setup-screen" class="screen active">
        <div class="setup-card">
            <div class="logo-icon"><i class="fa-solid fa-stethoscope"></i></div>
            <h1 class="text-2xl mb-1" style="color:var(--text);">Quiz Semeiotica</h1>
            <p style="color:var(--text-muted); font-size:0.95rem; margin-bottom:1.75rem;">Semeiotica Veterinaria — Test di autovalutazione</p>

            <h2 class="text-lg mb-3" style="color:var(--text); font-weight:700;">Prepara la tua sessione</h2>

            <label style="display:block; font-size:0.85rem; font-weight:600; color:var(--text-muted); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.06em;">
                Seleziona area tematica
            </label>
            <select id="category-select" class="list-box" aria-label="Selezione area tematica"></select>

            <div style="margin-top:1.25rem;">
                <label for="num-questions" style="display:block; font-size:0.85rem; font-weight:600; color:var(--text-muted); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.06em;">
                    Numero di domande
                </label>
                <input type="number" id="num-questions" class="num-input" min="1" value="5" aria-label="Numero di domande">
                <p id="num-hint" style="font-size:0.8rem; color:var(--text-muted); margin-top:0.3rem;"></p>
            </div>

            <div style="margin-top:1.5rem;">
                <button id="start-btn" class="btn-primary" disabled>
                    <i class="fa-solid fa-play" style="margin-right:0.4rem;"></i> Inizia il Quiz
                </button>
            </div>
        </div>
    </div>

    <!-- ============ QUIZ ============ -->
    <div id="quiz-screen" class="screen">
        <div class="quiz-container">
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.25rem;">
                <span id="q-counter" style="font-size:0.85rem; color:var(--text-muted); font-weight:600;"></span>
                <span id="q-score" style="font-size:0.85rem; color:var(--primary); font-weight:700;"></span>
            </div>
            <div class="progress-track"><div id="progress-fill" class="progress-fill" style="width:0%"></div></div>

            <div class="question-card">
                <span id="q-area-badge" class="question-area-badge"></span>
                <p id="q-text" class="question-text"></p>

                <div id="q-options" class="options-list" role="radiogroup"></div>

                <div id="feedback-container" style="display:none;"></div>
            </div>

            <div style="display:flex; gap:0.75rem; margin-top:1.25rem;">
                <button id="submit-btn" class="btn-primary" style="flex:1;" disabled>
                    <i class="fa-solid fa-check" style="margin-right:0.35rem;"></i> Conferma
                </button>
                <button id="next-btn" class="btn-primary" style="flex:1; display:none;">
                    Prossima <i class="fa-solid fa-arrow-right" style="margin-left:0.35rem;"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ============ RISULTATI ============ -->
    <div id="results-screen" class="screen">
        <div class="results-card">
            <h1 class="text-2xl mb-4" style="color:var(--text);">Risultati</h1>

            <svg class="score-ring" viewBox="0 0 120 120" width="150" height="150">
                <circle cx="60" cy="60" r="52" stroke="var(--border)" stroke-width="8" fill="none"/>
                <circle id="score-arc" cx="60" cy="60" r="52" stroke="var(--primary)" stroke-width="8" fill="none"
                        stroke-dasharray="326.73" stroke-dashoffset="326.73" stroke-linecap="round"
                        transform="rotate(-90 60 60)"/>
                <text id="score-pct" x="60" y="56" text-anchor="middle" fill="var(--text)" font-family="Playfair Display,serif" font-size="28" font-weight="900">0%</text>
                <text id="score-fraction" x="60" y="76" text-anchor="middle" fill="var(--text-muted)" font-family="Source Sans 3,sans-serif" font-size="13" font-weight="600">0/0</text>
            </svg>

            <p id="result-message" style="font-size:1.05rem; color:var(--text-muted); margin-bottom:1.75rem; line-height:1.5;"></p>

            <div style="display:flex; gap:0.75rem; justify-content:center; margin-bottom:1.5rem;">
                <button id="retry-btn" class="btn-secondary"><i class="fa-solid fa-rotate-right" style="margin-right:0.3rem;"></i> Riprova</button>
                <button id="new-session-btn" class="btn-primary" style="width:auto; padding:0.7rem 1.5rem;">
                    <i class="fa-solid fa-house" style="margin-right:0.3rem;"></i> Nuova Sessione
                </button>
            </div>

            <div style="text-align:left;">
                <h3 style="font-size:1rem; color:var(--text-muted); margin-bottom:0.75rem; font-family:'Source Sans 3',sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:0.06em;">Riepilogo risposte</h3>
                <div id="review-list"></div>
            </div>
        </div>
    </div>

    <script>
    /* ================================================================
       DATI DEL QUIZ
       ================================================================ */
    window.__QUIZ_DATA__ = [
      {
        "domanda": "la puntura esplorativa è effettuata al fine:",
        "a": "drenaggio di una lesione a contenuto fluido",
        "b": "per l'individuazione di un tragitto patologico",
        "c": "per l'inoculo di un colorante vitale",
        "d": "del prelievo del materiale per l'analisi macro e microscopica",
        "risposta_corretta": "d",
        "spiegazione": "Il testo specifica che la puntura esplorativa serve a prelevare materiale per analizzarlo sia macroscopicamente che microscopicamente, aiutando a distinguere la natura di un essudato.",
        "area": "compito"
      },
      {
        "domanda": "in caso di compromissione del nervo Trocleare (IV) il segno principale è",
        "a": "Strabismo mediale",
        "b": "Strabismo laterale",
        "c": "Rotazione del globo oculare",
        "d": "Strabismo ventrale",
        "risposta_corretta": "c",
        "spiegazione": "Nella specie felina, la pupilla ha forma ellittica e una lesione al nervo trocleare (che innerva il muscolo obliquo dorsale) provoca una \"leggera rotazione dell'occhio affetto\".",
        "area": "compito"
      },
      {
        "domanda": "l'indicazione principale per il flushing delle cavità nasali è rappresentata da lesioni di origine",
        "a": "Settica",
        "b": "Neoplastica",
        "c": "Infiammatoria",
        "d": "Degenerativa",
        "risposta_corretta": "b",
        "spiegazione": "La dispensa indica chiaramente che l'indicazione principale per questa procedura (lavaggio o flushing) è rappresentata dalle \"affezioni neoplastiche\" per l'ottenimento di campioni citologici.",
        "area": "compito"
      },
      {
        "domanda": "Il test della seduta è utile per valutare una zoppia",
        "a": "Al ginocchio e tarso",
        "b": "Al gomito e spalla",
        "c": "All'articolazione lombosacrale",
        "d": "All'anca e ginocchio",
        "risposta_corretta": "a",
        "spiegazione": "Il \"sit test\" può essere modificato in presenza di un'affezione dolorosa del \"ginocchio o del tarso\". Spesso il cane siede con il ginocchio esteso o portato fuori di sé.",
        "area": "compito"
      },
      {
        "domanda": "I deficit delle reazioni posturali possono suggerire",
        "a": "Una localizzazione specifica e puntuale della sintomatologia",
        "b": "Una localizzazione regionale generica della sintomatologia",
        "c": "informazioni sulla causa della lesione",
        "d": "Nulla sulla localizzazione della sintomatologia",
        "risposta_corretta": "b",
        "spiegazione": "Il testo afferma che i deficit delle reazioni posturali \"danno indicazioni sulla localizzazione regionale più che sulla localizzazione specifica di una lesione\".",
        "area": "compito"
      },
      {
        "domanda": "Per l'esame dell'orecchio il temperamento dei nostri pazienti:",
        "a": "Non influisce nell'esecuzione della valutazione",
        "b": "Impone talvolta sedazione anche profonda per una corretta valutazione",
        "c": "Non influisce nell'esecuzione della valutazione in quanto l'orecchio interno è scarsamente innervato",
        "d": "Impone unicamente un contenimento della testa del paziente",
        "risposta_corretta": "b",
        "spiegazione": "L'approccio a un condotto uditivo infiammato e dolente \"impone spesso una sedazione profonda o, meglio ancora, una breve anestesia\".",
        "area": "compito"
      },
      {
        "domanda": "Nel test del nistagmo post rotatorio fermando all'improvviso la rotazione, si evidenzia:",
        "a": "Nistagmo con fase veloce nella direzione opposta a quella di rotazione del corpo",
        "b": "Nistagmo con fase lenta nella direzione opposta a quella di rotazione del corpo",
        "c": "Nistagmo con fase lenta nella stessa direzione di quella di rotazione del corpo",
        "d": "Nistagmo con fase veloce nella stessa direzione di quella di rotazione del corpo",
        "risposta_corretta": "a",
        "spiegazione": "Nel test del nistagmo post rotatorio, quando s'interrompe la rotazione, compare il nistagmo la cui \"fase veloce avviene in direzione opposta alla rotazione del corpo\".",
        "area": "compito"
      },
      {
        "domanda": "Nella valutazione della base d'impianto di una tumefazione, la definizione di \"peduncolata\" indica che la base è meno ampia della massa stessa; tale carattere suggerisce solitamente:",
        "a": "Una natura infiltrante e maligna della lenione.",
        "b": "Una prognosi più favorevole e una maggiore facilità di asportazione.",
        "c": "Un'origine profonda a livello sottofasciale o osseo.",
        "d": "La presenza obbligatoria di gas all'interno della massa.",
        "risposta_corretta": "b",
        "spiegazione": "Base d'impianto: La fonte specifica che le masse peduncolate, avendo una base più stretta rispetto al volume della tumefazione, sono raramente infiltranti e più semplici da asportare chirurgicamente, rendendo la prognosi generalmente migliore rispetto alle forme sessili.",
        "area": "TUMEFAZIONI - dispensa"
      },
      {
        "domanda": "Durante la palpazione, la ricerca della \"fluttuazione\" è una manovra fondamentale per differenziare:",
        "a": "Un enfisema sottocutaneo da una frattura ossea.",
        "b": "Una massa solida (come un lipoma) da una raccolta liquida (come una cisti).",
        "c": "Una neoplasia benigna da una maligna infiltrante.",

    /* ================================================================
       STATO DELL'APPLICAZIONE
       ================================================================ */
    let categories = [];       // Array di { label, filterFn, count }
    let selectedFilter = null; // Funzione filtro della categoria selezionata
    let selectedCount = 0;     // Numero domande nella categoria scelta
    let quizQuestions = [];    // Domande misturate per questa sessione
    let currentIndex = 0;
    let score = 0;
    let userAnswers = [];      // { selectedKey, correctKey, isCorrect, question, shuffledOptions }
    let selectedOption = null; // Chiave dell'opzione attualmente selezionata
    let answered = false;

    /* ================================================================
       FUNZIONI HELPER
       ================================================================ */

    // Verifica se un'area è "dispensa" (termina per "dispensa" o "dispense")
    function isDispensa(area) {
        return /dispensa$/i.test(area) || /dispense$/i.test(area);
    }

    // Verifica se un'area è "altre fonti"
    function isAltreFonti(area) {
        return /altre fonti$/i.test(area);
    }

    // Mescola un array (Fisher-Yates)
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // Genera le opzioni mescolate per una domanda
    function getShuffledOptions(q) {
        const opts = [
            { key: 'a', text: q.a },
            { key: 'b', text: q.b },
            { key: 'c', text: q.c },
            { key: 'd', text: q.d }
        ];
        return shuffle(opts);
    }

    // Mappa indice → lettera mostrata (A, B, C, D in base alla posizione mescolata)
    function keyToLetter(index) {
        return String.fromCharCode(65 + index);
    }

    /* ================================================================
       GENERAZIONE DINAMICA DELLE CATEGORIE
       ================================================================ */
    function buildCategories() {
        const data = window.__QUIZ_DATA__;
        const cats = [];

        // 1) Tutte le domande
        cats.push({
            label: 'Tutte le domande (' + data.length + ')',
            filterFn: () => true,
            count: data.length
        });

        // 2) Compiti (esatto: "compito")
        const compiti = data.filter(q => q.area === 'compito');
        cats.push({
            label: 'Compiti (' + compiti.length + ')',
            filterFn: q => q.area === 'compito',
            count: compiti.length
        });

        // 3) Dispense (termina per "dispensa" o "dispense")
        const dispense = data.filter(q => isDispensa(q.area));
        cats.push({
            label: 'Dispense (' + dispense.length + ')',
            filterFn: q => isDispensa(q.area),
            count: dispense.length
        });

        // 4) Altre fonti
        const altre = data.filter(q => isAltreFonti(q.area));
        cats.push({
            label: 'Altre fonti (' + altre.length + ')',
            filterFn: q => isAltreFonti(q.area),
            count: altre.length
        });

        // 5) Dispense + Altre fonti
        const dispAlt = data.filter(q => isDispensa(q.area) || isAltreFonti(q.area));
        cats.push({
            label: 'Dispense + Altre fonti (' + dispAlt.length + ')',
            filterFn: q => isDispensa(q.area) || isAltreFonti(q.area),
            count: dispAlt.length
        });

        // 6) Argomenti dinamici: estrai il prefisso prima di " - " nelle aree
        const topicMap = {};
        data.forEach(q => {
            // Cerca il separatore " - " (con spazi)
            const idx = q.area.indexOf(' - ');
            if (idx > 0) {
                const topic = q.area.substring(0, idx).trim();
                if (!topicMap[topic]) topicMap[topic] = 0;
                topicMap[topic]++;
            }
        });

        // Ordina alfabeticamente
        const topics = Object.keys(topicMap).sort();
        topics.forEach(topic => {
            cats.push({
                label: topic + ' (' + topicMap[topic] + ')',
                filterFn: q => q.area.startsWith(topic),
                count: topicMap[topic]
            });
        });

        return cats;
    }

    /* ================================================================
       POPOLAMENTO LISTA (SELECT con OPTGROUP)
       ================================================================ */
    function populateList() {
        const sel = document.getElementById('category-select');
        sel.innerHTML = '';

        // Primo optgroup: Categorie fisse
        const ogFixed = document.createElement('optgroup');
        ogFixed.label = 'Categorie';
        for (let i = 0; i < 5; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = categories[i].label;
            ogFixed.appendChild(opt);
        }
        sel.appendChild(ogFixed);

        // Secondo optgroup: Argomenti (se presenti)
        if (categories.length > 5) {
            const ogTopics = document.createElement('optgroup');
            ogTopics.label = 'Argomenti';
            for (let i = 5; i < categories.length; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = categories[i].label;
                ogTopics.appendChild(opt);
            }
            sel.appendChild(ogTopics);
        }
    }

    /* ================================================================
       GESTIONE SETUP
       ================================================================ */
    function onCategoryChange() {
        const idx = parseInt(document.getElementById('category-select').value);
        const cat = categories[idx];
        selectedFilter = cat.filterFn;
        selectedCount = cat.count;

        const numInput = document.getElementById('num-questions');
        const hint = document.getElementById('num-hint');
        const startBtn = document.getElementById('start-btn');

        numInput.max = selectedCount;
        numInput.min = 1;
        hint.textContent = 'Disponibili: ' + selectedCount + ' domande';

        // Se il valore attuale supera il massimo, lo riporta al massimo
        if (parseInt(numInput.value) > selectedCount) {
            numInput.value = selectedCount;
        }
        if (parseInt(numInput.value) < 1) {
            numInput.value = 1;
        }

        // Abilita/disabilita il bottone in base al conteggio
        startBtn.disabled = (selectedCount === 0);
    }

    /* ================================================================
       AVVIO DEL QUIZ
       ================================================================ */
    function startQuiz() {
        const num = parseInt(document.getElementById('num-questions').value);
        const count = Math.min(Math.max(num, 1), selectedCount);

        // Filtra e mescola le domande
        const filtered = window.__QUIZ_DATA__.filter(selectedFilter);
        quizQuestions = shuffle(filtered).slice(0, count);

        currentIndex = 0;
        score = 0;
        userAnswers = [];

        switchScreen('quiz-screen');
        renderQuestion();
    }

    /* ================================================================
       RENDERING DOMANDA
       ================================================================ */
    function renderQuestion() {
        answered = false;
        selectedOption = null;

        const q = quizQuestions[currentIndex];
        const total = quizQuestions.length;
        const shuffled = getShuffledOptions(q);

        // Contatore e punteggio
        document.getElementById('q-counter').textContent = 'Domanda ' + (currentIndex + 1) + ' di ' + total;
        document.getElementById('q-score').textContent = 'Punteggio: ' + score + '/' + currentIndex;

        // Barra di progresso
        const pct = ((currentIndex) / total) * 100;
        document.getElementById('progress-fill').style.width = pct + '%';

        // Badge area
        document.getElementById('q-area-badge').textContent = q.area;

        // Testo domanda
        document.getElementById('q-text').textContent = q.domanda;

        // Opzioni
        const optContainer = document.getElementById('q-options');
        optContainer.innerHTML = '';
        shuffled.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.setAttribute('role', 'radio');
            btn.setAttribute('aria-checked', 'false');
            btn.dataset.key = opt.key;
            btn.innerHTML =
                '<span class="opt-letter">' + keyToLetter(i) + '</span>' +
                '<span>' + opt.text + '</span>';
            btn.addEventListener('click', () => selectOption(btn, opt.key));
            optContainer.appendChild(btn);
        });

        // Nascondi feedback, mostra conferma, nascondi avanti
        document.getElementById('feedback-container').style.display = 'none';
        document.getElementById('feedback-container').innerHTML = '';
        document.getElementById('submit-btn').style.display = '';
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('next-btn').style.display = 'none';
    }

    /* ================================================================
       SELEZIONE OPZIONE
       ================================================================ */
    function selectOption(btn, key) {
        if (answered) return;
        selectedOption = key;

        // Aggiorna stile di tutte le opzioni
        const allBtns = document.querySelectorAll('#q-options .option-btn');
        allBtns.forEach(b => {
            b.classList.remove('selected');
            b.setAttribute('aria-checked', 'false');
        });
        btn.classList.add('selected');
        btn.setAttribute('aria-checked', 'true');

        document.getElementById('submit-btn').disabled = false;
    }

    /* ================================================================
       CONFERMA RISPOSTA
       ================================================================ */
    function submitAnswer() {
        if (answered || selectedOption === null) return;
        answered = true;

        const q = quizQuestions[currentIndex];
        const isCorrect = selectedOption === q.risposta_corretta;
        if (isCorrect) score++;

        // Salva la risposta per il riepilogo
        const shuffledOpts = [];
        document.querySelectorAll('#q-options .option-btn').forEach(b => {
            shuffledOpts.push({ key: b.dataset.key, text: b.querySelector('span:last-child').textContent });
        });
        userAnswers.push({
            selectedKey: selectedOption,
            correctKey: q.risposta_corretta,
            isCorrect: isCorrect,
            question: q,
            shuffledOptions: shuffledOpts
        });

        // Blocca tutte le opzioni e applica stili
        const allBtns = document.querySelectorAll('#q-options .option-btn');
        allBtns.forEach(b => {
            b.classList.add('locked');
            const k = b.dataset.key;
            if (k === q.risposta_corretta) {
                b.classList.add('correct-answer');
            } else if (k === selectedOption && !isCorrect) {
                b.classList.add('wrong-selected');
            } else {
                b.classList.add('dimmed');
            }
        });

        // Aggiorna punteggio visibile
        document.getElementById('q-score').textContent = 'Punteggio: ' + score + '/' + (currentIndex + 1);

        // Mostra feedback con spiegazione
        showFeedback(isCorrect, q);

        // Nascondi conferma, mostra avanti
        document.getElementById('submit-btn').style.display = 'none';
        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = '';

        // Cambia testo del bottone se è l'ultima domanda
        if (currentIndex >= quizQuestions.length - 1) {
            nextBtn.innerHTML = 'Vedi Risultati <i class="fa-solid fa-trophy" style="margin-left:0.35rem;"></i>';
        } else {
            nextBtn.innerHTML = 'Prossima <i class="fa-solid fa-arrow-right" style="margin-left:0.35rem;"></i>';
        }
    }

    /* ================================================================
       FEEDBACK CON SPIEGAZIONE
       ================================================================ */
    function showFeedback(isCorrect, q) {
        const container = document.getElementById('feedback-container');
        const typeClass = isCorrect ? 'correct' : 'wrong';
        const icon = isCorrect ? 'fa-circle-check' : 'fa-circle-xmark';
        const titleText = isCorrect ? 'Risposta corretta!' : 'Risposta sbagliata';

        // Trova il testo della risposta corretta
        const correctText = q[q.risposta_corretta];

        let html = '<div class="feedback-box ' + typeClass + '">';
        html += '<div class="feedback-title"><i class="fa-solid ' + icon + '"></i> ' + titleText + '</div>';

        if (!isCorrect) {
            html += '<p style="font-size:0.95rem; color:var(--text); margin-bottom:0.5rem;">Risposta corretta: <strong>' + correctText + '</strong></p>';
        }

        // Spiegazione — sempre visibile
        html += '<div class="spiegazione-box">';
        html += '<div class="spiegazione-label"><i class="fa-solid fa-lightbulb" style="margin-right:0.3rem;"></i> Spiegazione</div>';
        html += '<p>' + q.spiegazione + '</p>';
        html += '</div>';

        html += '</div>';

        container.innerHTML = html;
        container.style.display = 'block';
    }

    /* ================================================================
       PROSSIMA DOMANDA O RISULTATI
       ================================================================ */
    function nextQuestion() {
        currentIndex++;
        if (currentIndex >= quizQuestions.length) {
            showResults();
        } else {
            renderQuestion();
        }
    }

    /* ================================================================
       SCHERMATA RISULTATI
       ================================================================ */
    function showResults() {
        switchScreen('results-screen');

        const total = quizQuestions.length;
        const pct = Math.round((score / total) * 100);
        const circumference = 2 * Math.PI * 52; // r=52 → ~326.73
        const offset = circumference * (1 - pct / 100);

        // Arco SVG
        const arc = document.getElementById('score-arc');
        arc.style.stroke = pct >= 70 ? 'var(--primary)' : pct >= 50 ? 'var(--accent)' : 'var(--wrong)';
        // Animazione: parte da offset pieno e arriva a quello calcolato
        arc.style.strokeDashoffset = circumference;
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                arc.style.strokeDashoffset = offset;
            });
        });

        // Testo percentuale e frazione
        document.getElementById('score-pct').textContent = pct + '%';
        document.getElementById('score-fraction').textContent = score + '/' + total;

        // Messaggio
        let msg = '';
        if (pct >= 90) msg = 'Eccellente! Padronanza completa dell\'argomento.';
        else if (pct >= 70) msg = 'Buon risultato! Qualche concetto da ripassare.';
        else if (pct >= 50) msg = 'Sufficiente. Ti consiglio una rilettura delle dispense.';
        else msg = 'Da ripassare. Rileggi il materiale e riprova.';
        document.getElementById('result-message').textContent = msg;

        // Riepilogo risposte
        const reviewList = document.getElementById('review-list');
        reviewList.innerHTML = '';
        userAnswers.forEach((ua, i) => {
            const q = ua.question;
            const cls = ua.isCorrect ? 'was-correct' : 'was-wrong';
            let html = '<div class="review-item ' + cls + '">';
            html += '<div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.4rem;">';
            html += '<span style="font-size:0.8rem; color:var(--text-muted); font-weight:600;">Domanda ' + (i + 1) + '</span>';
            html += '<span style="font-size:0.8rem; font-weight:700; color:' + (ua.isCorrect ? 'var(--correct)' : 'var(--wrong)') + ';">';
            html += ua.isCorrect ? '<i class="fa-solid fa-check"></i> Corretta' : '<i class="fa-solid fa-xmark"></i> Sbagliata';
            html += '</span></div>';
            html += '<p style="font-size:0.95rem; font-weight:600; margin-bottom:0.5rem; line-height:1.5;">' + q.domanda + '</p>';

            if (!ua.isCorrect) {
                // Trova il testo della risposta selezionata e di quella corretta
                const selectedOpt = ua.shuffledOptions.find(o => o.key === ua.selectedKey);
                const correctOpt = ua.shuffledOptions.find(o => o.key === ua.correctKey);
                html += '<p style="font-size:0.88rem; color:var(--wrong); margin-bottom:0.25rem;">La tua risposta: ' + (selectedOpt ? selectedOpt.text : '—') + '</p>';
                html += '<p style="font-size:0.88rem; color:var(--correct); margin-bottom:0.5rem;">Risposta corretta: ' + (correctOpt ? correctOpt.text : '—') + '</p>';
            }

            // Spiegazione sempre visibile
            html += '<div class="spiegazione-box" style="margin-top:0.5rem;">';
            html += '<div class="spiegazione-label"><i class="fa-solid fa-lightbulb" style="margin-right:0.3rem;"></i> Spiegazione</div>';
            html += '<p>' + q.spiegazione + '</p>';
            html += '</div>';

            html += '</div>';
            reviewList.innerHTML += html;
        });
    }

    /* ================================================================
       NAVIGAZIONE SCHERMATE
       ================================================================ */
    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ================================================================
       SUPPORTO TASTIERA
       ================================================================ */
    document.addEventListener('keydown', (e) => {
        const quizScreen = document.getElementById('quiz-screen');
        if (!quizScreen.classList.contains('active')) return;

        // 1-4 per selezionare opzione
        if (!answered && e.key >= '1' && e.key <= '4') {
            const idx = parseInt(e.key) - 1;
            const btns = document.querySelectorAll('#q-options .option-btn');
            if (btns[idx]) {
                const key = btns[idx].dataset.key;
                selectOption(btns[idx], key);
            }
        }

        // Invio per confermare o andare avanti
        if (e.key === 'Enter') {
            if (!answered && selectedOption !== null) {
                submitAnswer();
            } else if (answered) {
                nextQuestion();
            }
        }
    });

    /* ================================================================
       INIZIALIZZAZIONE
       ================================================================ */
    function init() {
        categories = buildCategories();
        populateList();

        document.getElementById('category-select').addEventListener('change', onCategoryChange);
        document.getElementById('num-questions').addEventListener('input', () => {
            const numInput = document.getElementById('num-questions');
            let v = parseInt(numInput.value);
            if (isNaN(v) || v < 1) v = 1;
            if (v > selectedCount) v = selectedCount;
            numInput.value = v;
        });

        document.getElementById('start-btn').addEventListener('click', startQuiz);
        document.getElementById('submit-btn').addEventListener('click', submitAnswer);
        document.getElementById('next-btn').addEventListener('click', nextQuestion);
        document.getElementById('retry-btn').addEventListener('click', () => {
            // Riprova con le stesse impostazioni
            startQuiz();
        });
        document.getElementById('new-session-btn').addEventListener('click', () => {
            switchScreen('setup-screen');
        });

        // Inizializza il primo cambiamento per impostare i valori
        onCategoryChange();
    }

    init();
    </script>
